        // Ensure the exact starting 5 requested by the user
        const DEFAULT_STARTING_5 = [
            GLOBAL_STATIONS.find(s => s.id === 's-kexp'),
            GLOBAL_STATIONS.find(s => s.id === 's-wfmu'),
            GLOBAL_STATIONS.find(s => s.id === 's-shonan'),
            GLOBAL_STATIONS.find(s => s.id === 's-fip'),
            GLOBAL_STATIONS.find(s => s.id === 's-ibero'),
        ];

        function App() {
          const [displayStations, setDisplayStations] = useState(DEFAULT_STARTING_5);
          const [currentStation, setCurrentStation] = useState(DEFAULT_STARTING_5[0]);
          const [isPlaying, setIsPlaying] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [playerError, setPlayerError] = useState(null);
          const [volume, setVolume] = useState(0.8);
          const audioRef = useRef(null);

          const RefreshIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 0 20.49 15"></path></svg>;
          const PlayIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
          const PauseIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>;
          const PrevIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>;
          const NextIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>;

          const refreshStations = () => {
            let pool = GLOBAL_STATIONS.filter(station => !displayStations.some(d => d.id === station.id));
            for (let i = pool.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            setDisplayStations(pool.slice(0, 5));
          };

          const handlePlayStation = (station) => {
            setPlayerError(null);
            setCurrentStation(station);
            setIsLoading(true);
            
            if (audioRef.current) {
              audioRef.current.pause();
              audioRef.current.src = station.streams[0].url;
              audioRef.current.load();
              
              audioRef.current.play()
                .then(() => {
                  setIsPlaying(true);
                  setIsLoading(false);
                })
                .catch((error) => {
                  setIsLoading(false);
                  if (error.name === 'AbortError') return;
                  setIsPlaying(false);
                  setPlayerError("STATION_OFFLINE");
                });
            }
          };

          const togglePlay = () => {
            if (!audioRef.current) return;
            
            if (isPlaying) {
              audioRef.current.pause();
              setIsPlaying(false);
            } else {
              if (!audioRef.current.src || !audioRef.current.src.includes(currentStation.streams[0].url)) {
                handlePlayStation(currentStation);
                return;
              }

              setIsLoading(true);
              setPlayerError(null);
              audioRef.current.play()
                .then(() => {
                  setIsPlaying(true);
                  setIsLoading(false);
                })
                .catch((error) => {
                  setIsLoading(false);
                  if (error.name !== 'AbortError') {
                    setPlayerError("STATION_OFFLINE");
                  }
                });
            }
          };

          const handleVolumeChange = (e) => {
            const val = parseFloat(e.target.value);
            setVolume(val);
            if (audioRef.current) audioRef.current.volume = val;
          };

          const playOffset = (offset) => {
            if (!displayStations.length) return;
            const idx = displayStations.findIndex(s => s.id === currentStation?.id);
            let nextIdx = (idx + offset) % displayStations.length;
            if (nextIdx < 0) nextIdx = displayStations.length - 1;
            handlePlayStation(displayStations[nextIdx]);
          };

          const renderRulerTicks = () => {
            let baseFreq = parseFloat(currentStation.freq);
            if (isNaN(baseFreq)) baseFreq = 90.0;
            const ticks = [];
            for (let i = -15; i <= 15; i++) {
              const isMajor = i % 5 === 0;
              ticks.push(
                <div key={i} className="flex flex-col items-center justify-end h-full">
                  <div className={`w-[2px] bg-black/30 rounded-full ${isMajor ? 'h-3 md:h-4' : 'h-1.5 md:h-2'}`}></div>
                  {isMajor && <span className="text-[9px] text-black/60 font-bold mt-1 absolute bottom-[-16px]">{(baseFreq + (i * 0.2)).toFixed(1)}</span>}
                </div>
              );
            }
            return ticks;
          };

          return (
            // fixed inset-0 completely locks the app to the viewport with NO scrolling
            <div className="fixed inset-0 bg-[#E5E5E5] flex items-center justify-center p-2 md:p-6 font-sans selection:bg-[#FF5000] selection:text-white">
              
              {/* TE WIDGET CONTAINER - Brutalist border, sharp radius, hard shadow */}
              <div className="bg-[#FFFFFF] w-full h-full max-w-[900px] max-h-[850px] md:max-h-[600px] rounded-[24px] border-[3px] border-black p-2 md:p-4 shadow-[4px_4px_0_0_#000000,8px_8px_0_0_#FF5000] flex flex-col md:flex-row gap-2 md:gap-4 items-stretch">
                
                {/* LEFT PANE: TUNER DISPLAY */}
                <div className="w-full md:w-1/2 flex flex-col h-[45%] md:h-full gap-2 md:gap-4">
                  
                  {/* Digital Screen Area */}
                  <div className="bg-[#111111] rounded-[16px] p-3 flex flex-col gap-2 shadow-[inset_0_4px_10px_rgba(0,0,0,0.8)] border-[3px] border-black flex-1 min-h-0 relative">
                    
                    {/* Top row: Frequency Badge & Status */}
                    <div className="flex justify-between items-start">

                        <h2 className="text-6xl md:text-[5.5rem] font-black tracking-tighter leading-none mt-1">
                          {currentStation.freq === 'LIVE' ? 'NET' : currentStation.freq}
                        </h2>
                        <span className="text-xs md:text-sm font-bold uppercase tracking-widest mb-1 ml-1">{currentStation.freq === 'LIVE' ? 'STRM' : 'MHz'}</span>
                      </div>

                      <div className="flex items-center gap-2 bg-[#222] border border-[#333] px-2 py-1 rounded-md">
                        <span className={`w-2 h-2 rounded-full border border-black ${isLoading ? 'bg-[#FF5000] animate-ping' : isPlaying ? 'bg-[#00FF66] shadow-[0_0_8px_#00FF66]' : 'bg-[#444]'}`}></span>
                        <span className="text-[9px] font-mono text-white/70 uppercase tracking-widest">
                          {playerError ? 'ERR' : isLoading ? 'SYNC' : isPlaying ? 'LIVE' : 'RDY'}
                        </span>
                      </div>
                    </div>

                    {/* Middle row: Station Title & Location Badge */}
                    <div className="mt-auto">
                      {playerError ? (
                        <h3 className="text-xl md:text-2xl font-black text-[#FF5000] uppercase tracking-tight truncate">{playerError}</h3>
                      ) : (

                      )}
                      <div className="flex items-center gap-2 mt-1">

                          {currentStation.location.cityName}
                        </p>
                        <span className="bg-white/20 text-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-widest uppercase">
                          {currentStation.location.country}
                        </span>
                      </div>
                    </div>

                    {/* Bottom row: TE Style Tags & Support Link */}
                    <div className="bg-[#000] border border-[#333] rounded-[6px] p-2 mt-2 flex flex-col gap-1">
                      <div className="flex items-center gap-1.5 overflow-hidden">
                        <span className="text-[8px] text-[#FF5000] font-black uppercase tracking-widest flex-shrink-0">TAGS &gt;</span>
                        <div className="flex gap-1.5 flex-wrap flex-1 overflow-hidden h-3">
                          {currentStation.tags.map((tag, idx) => (
                            <span key={idx} className="text-[9px] text-white/60 font-bold uppercase leading-none whitespace-nowrap">{tag}</span>
                          ))}
                        </div>
                      </div>
                      <div className="flex items-center gap-1.5 overflow-hidden border-t border-[#222] pt-1">
                        <span className="text-[8px] text-[#00FF66] font-black uppercase tracking-widest flex-shrink-0">SUPPORT &gt;</span>
                        <span className="text-[9px] font-mono text-white/80 uppercase truncate flex-1 tracking-wider">
                          SUPPORT THE STATION <a href={currentStation.website} target="_blank" rel="noopener noreferrer" className="text-[#FF5000] hover:underline cursor-pointer relative z-10">HERE</a>
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Frequency Ruler (White/Black TE Style) */}
                  <div className="h-[48px] md:h-[60px] bg-[#F4F4F4] rounded-[12px] border-2 border-black flex items-center justify-between px-2 relative overflow-hidden flex-shrink-0">
                    <button onClick={() => playOffset(-1)} className="w-8 h-8 flex items-center justify-center text-black hover:bg-black/10 rounded-full transition-colors z-10 active:scale-90"><PrevIcon /></button>
                    
                    <div className="flex-1 h-full relative flex items-center justify-center overflow-hidden pb-4">
                      <div className="flex justify-between items-end w-full max-w-[280px] h-6 relative">
                        {renderRulerTicks()}
                      </div>
                      <div className="absolute w-[3px] h-[28px] md:h-[32px] bg-[#FF5000] border border-black rounded-full z-20 top-1/2 -translate-y-1/2 shadow-sm"></div>
                    </div>

                    <button onClick={() => playOffset(1)} className="w-8 h-8 flex items-center justify-center text-black hover:bg-black/10 rounded-full transition-colors z-10 active:scale-90"><NextIcon /></button>
                  </div>
                </div>

                {/* Divider Line (Mobile = horizontal, Desktop = vertical) */}
                <div className="w-full md:w-[3px] h-[3px] md:h-full bg-black flex-shrink-0 rounded-full my-1 md:my-0"></div>

                {/* RIGHT PANE: DIRECTORY & CONTROLS */}
                <div className="w-full md:w-1/2 flex flex-col h-[55%] md:h-full">
                  
                  {/* Directory Header */}
                  <div className="flex justify-between items-center pb-2 flex-shrink-0 border-b-2 border-black">
                    <span className="text-xs md:text-sm font-black text-black uppercase tracking-widest">
                      CH. DIRECTORY
                    </span>
                    <button onClick={refreshStations} className="flex items-center gap-1 bg-black text-white px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-bold uppercase tracking-widest hover:bg-[#FF5000] active:scale-95 transition-all">
                      Scan <RefreshIcon />
                    </button>
                  </div>

                  {/* Station List */}
                  <div className="flex flex-col gap-1.5 md:gap-2 flex-1 min-h-0 overflow-y-auto scrollbar-hide py-2">
                    {displayStations.map((station, idx) => {
                      const isActive = currentStation.id === station.id;
                      return (
                        <div 
                          key={station.id} 
                          onClick={() => handlePlayStation(station)}
                          className={`cursor-pointer rounded-[12px] px-3 py-2 md:py-3 flex justify-between items-center border-[2px] transition-all flex-shrink-0 ${
                            isActive 
                              ? 'bg-[#FF5000] border-black text-black shadow-[2px_2px_0_0_#000]' 
                              : 'bg-[#F4F4F4] border-black/10 text-black hover:border-black'
                          }`}
                        >
                          <div className="flex items-center gap-3 overflow-hidden">
                            <span className={`text-[10px] font-black w-4 ${isActive ? 'opacity-100' : 'opacity-40'}`}>
                              0{idx + 1}
                            </span>
                            <span className="font-black text-sm md:text-base uppercase tracking-tight truncate">
                              {station.name}
                            </span>
                            <span className={`hidden sm:inline-block text-[8px] font-black uppercase px-1.5 py-0.5 rounded-sm border ${isActive ? 'border-black/30' : 'border-black/10 text-black/50'}`}>
                              {station.location.country}
                            </span>
                          </div>
                          <span className={`font-bold text-[10px] md:text-xs tracking-widest ${isActive ? 'opacity-100' : 'opacity-50'}`}>
                            {station.freq}
                          </span>
                        </div>
                      );
                    })}
                  </div>

                  {/* Bottom Controls / Transport & Vol (Fixed at bottom) */}
                  <div className="flex flex-col flex-shrink-0 mt-auto pt-2 border-t-2 border-black">
                    
                    <div className="flex items-center justify-between h-12 md:h-14">
                      
                      {/* Transport */}
                      <div className="flex items-center gap-2">
                        <button onClick={togglePlay} className="w-10 h-10 md:w-12 md:h-12 bg-black text-white rounded-full flex items-center justify-center hover:bg-[#FF5000] active:scale-90 transition-all shadow-[2px_2px_0_0_#E5E5E5]">
                          {isPlaying ? <PauseIcon /> : <PlayIcon />}
                        </button>
                        <div className="flex flex-col ml-1">
                          <span className="text-[8px] font-black uppercase tracking-widest opacity-50">TRANSPORT</span>
                          <span className="text-[10px] font-bold uppercase tracking-wider">{isPlaying ? 'PLAY' : 'STOP'}</span>
                        </div>
                      </div>

                      {/* Volume */}
                      <div className="flex items-center gap-2 md:gap-3 bg-[#F4F4F4] border-2 border-black rounded-[12px] px-3 py-1.5 md:py-2">
                        <span className="text-[9px] font-black uppercase tracking-widest hidden sm:block">VOL</span>
                        <input 
                          type="range" min="0" max="1" step="0.01" value={volume} onChange={handleVolumeChange}
                          className="w-24 md:w-32"
                        />
                      </div>

                    </div>
                  </div>

                </div>

              </div>
              <audio ref={audioRef} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
